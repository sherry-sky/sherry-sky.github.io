<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>习题解答 - 分析化学</title>
  <link rel="stylesheet" href="../../css/style.css">
  <!-- 引入 marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- 引入 MathJax 用于渲染数学公式 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        // 处理 Markdown 中的 $ 符号
        packages: {'[+]': ['noerrors']}
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: function() {
          return MathJax.startup.defaultPageReady();
        }
      },
      // 忽略 HTML 实体转义
      ignoreHtmlClass: 'tex2jax_ignore'
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>
  <script>
    // 设置当前课程
    window.currentCourse = 'analytical-chemistry';
  </script>

  <!-- 通用内容查看器容器 -->
  <div id="viewer-container"></div>

  <!-- 页脚容器 -->
  <div id="footer-container"></div>

  <!-- 引入组件加载脚本和通用查看器脚本 -->
  <script src="../../js/components.js"></script>
  <script src="../../js/content-viewer.js"></script>
  <script>
    // 配置查看器
    document.addEventListener('DOMContentLoaded', function() {
      loadComponent('navbar', 'navbar-container');
      loadComponent('footer', 'footer-container');
      loadComponent('content-viewer', 'viewer-container');
      setCurrentPage('tutorials');
      
      // 初始化查看器配置
      viewerInit({
        type: 'tutorials',
        navItems: [
          { id: '2', title: 'Tutorial 2 - 基础概念' },
          { id: '3', title: 'Tutorial 3 - 误差分析' },
          { id: '4', title: 'Tutorial 4 - 随机误差' },
          { id: '5', title: 'Tutorial 5 - 线性回归' },
          { id: '6', title: 'Tutorial 6 - pH 与缓冲溶液' },
          { id: '7', title: 'Tutorial 7 - 酸碱滴定' },
          { id: '8', title: 'Tutorial 8 - 滴定分析' },
          { id: '9', title: 'Tutorial 9 - 电位滴定' },
          { id: '10', title: 'Tutorial 10 - Gran 作图法' },
          { id: '11', title: 'Tutorial 11 - 电化学分析' },
          { id: '12', title: 'Tutorial 12 - 重量分析' }
        ],
        filePattern: 'tutorials/tutorial-{id}.md',
        defaultId: '2',
        listPage: 'tutorials.html',
        titlePrefix: 'Tutorial ',
        urlParam: 'tutorial',
        course: 'analytical-chemistry',
        navTitle: '📚 章节导航',
        loadingText: '正在加载习题内容...',
        errorText: '无法加载习题内容',
        prevText: '← 上一题',
        nextText: '下一题 →',
        listText: '📋 返回习题列表'
      });
    });
  </script>
</body>
</html>
