<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试资料 - 分析化学</title>
  <link rel="stylesheet" href="../../css/style.css">
  <!-- 引入 marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- 引入 MathJax 用于渲染数学公式 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        // 处理 Markdown 中的 $ 符号
        packages: {'[+]': ['noerrors']}
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: function() {
          return MathJax.startup.defaultPageReady();
        }
      },
      // 忽略 HTML 实体转义
      ignoreHtmlClass: 'tex2jax_ignore'
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>
  <script>
    // 设置当前课程
    window.currentCourse = 'analytical-chemistry';
  </script>

  <!-- 通用内容查看器容器 -->
  <div id="viewer-container"></div>

  <!-- 页脚容器 -->
  <div id="footer-container"></div>

  <!-- 引入组件加载脚本和通用查看器脚本 -->
  <script src="../../js/components.js"></script>
  <script src="../../js/content-viewer.js"></script>
  <script>
    // 配置查看器
    document.addEventListener('DOMContentLoaded', function() {
      loadComponent('navbar', 'navbar-container');
      loadComponent('footer', 'footer-container');
      loadComponent('content-viewer', 'viewer-container');
      setCurrentPage('exams');
      
      // 初始化查看器配置
      viewerInit({
        type: 'exams',
        navItems: [
          { id: 'model', title: '📄 期末考试样题模型' },
          { id: '2024spring', title: '📝 2024 春季期末考试 A 卷' }
        ],
        filePattern: 'exams/final_exam_{id}.md',
        defaultId: 'model',
        listPage: 'exams.html',
        titlePrefix: '',
        urlParam: 'exam',
        course: 'analytical-chemistry',
        navTitle: '📚 章节导航',
        loadingText: '正在加载考试资料...',
        errorText: '无法加载考试资料',
        prevText: '← 上一份',
        nextText: '下一份 →',
        listText: '📋 返回考试列表'
      });
    });
  </script>
</body>
</html>
