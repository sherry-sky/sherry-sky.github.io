<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课后作业 - 分析化学</title>
  <link rel="stylesheet" href="../../css/style.css">
  <!-- 引入 marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- 引入 MathJax 用于渲染数学公式 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: function() {
          return MathJax.startup.defaultPageReady();
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>
  <script>
    // 设置当前课程
    window.currentCourse = 'analytical-chemistry';
  </script>

  <!-- 通用内容查看器容器 -->
  <div id="viewer-container"></div>

  <!-- 页脚容器 -->
  <div id="footer-container"></div>

  <!-- 引入组件加载脚本和通用查看器脚本 -->
  <script src="../../js/components.js"></script>
  <script src="../../js/content-viewer.js"></script>
  <script>
    // 配置查看器
    document.addEventListener('DOMContentLoaded', function() {
      loadComponent('navbar', 'navbar-container');
      loadComponent('footer', 'footer-container');
      loadComponent('content-viewer', 'viewer-container');
      setCurrentPage('homework');
      
      // 初始化查看器配置
      viewerInit({
        type: 'homework',
        navItems: [
          { id: '2', title: 'Homework 2 - 基础作业' },
          { id: '3', title: 'Homework 3 - 误差分析作业' },
          { id: '4', title: 'Homework 4 - 随机误差作业' },
          { id: '5', title: 'Homework 5 - 线性回归作业' },
          { id: '6', title: 'Homework 6 - pH 与缓冲溶液作业' },
          { id: '7', title: 'Homework 7 - 滴定分析作业' },
          { id: '8', title: 'Homework 8 - 电位滴定作业' },
          { id: '9', title: 'Homework 9 - Gran 作图法作业' },
          { id: '10', title: 'Homework 10 - 电化学分析作业' },
          { id: '11', title: 'Homework 11 - 重量分析作业' },
          { id: '12', title: 'Homework 12 - 综合复习作业' }
        ],
        filePattern: 'homeworks/homework{id}.md',
        defaultId: '2',
        listPage: 'homework.html',
        titlePrefix: 'Homework ',
        urlParam: 'homework',
        course: 'analytical-chemistry',
        navTitle: '📚 章节导航',
        loadingText: '正在加载作业内容...',
        errorText: '无法加载作业内容',
        prevText: '← 上一次',
        nextText: '下一次 →',
        listText: '📋 返回作业列表'
      });
    });
  </script>
</body>
</html>
