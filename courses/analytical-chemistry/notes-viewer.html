<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记阅读 - 分析化学</title>
  <link rel="stylesheet" href="../../css/style.css">
  <!-- 引入 marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- 引入 MathJax 用于渲染数学公式 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: function() {
          return MathJax.startup.defaultPageReady();
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>
  <script>
    // 设置当前课程
    window.currentCourse = 'analytical-chemistry';
  </script>

  <!-- 通用内容查看器容器 -->
  <div id="viewer-container"></div>

  <!-- 页脚容器 -->
  <div id="footer-container"></div>

  <!-- 引入组件加载脚本和通用查看器脚本 -->
  <script src="../../js/components.js"></script>
  <script src="../../js/content-viewer.js"></script>
  <script>
    // 配置查看器
    document.addEventListener('DOMContentLoaded', function() {
      loadComponent('navbar', 'navbar-container');
      loadComponent('footer', 'footer-container');
      loadComponent('content-viewer', 'viewer-container');
      setCurrentPage('notes');
      
      // 初始化查看器配置
      viewerInit({
        type: 'notes',
        navItems: [
          { id: '1', title: '第 1 章 分析化学导论' },
          { id: '2', title: '第 2 章 基础知识' },
          { id: '3', title: '第 3 章 实验误差' },
          { id: '4', title: '第 4 章 随机误差' },
          { id: '5', title: '第 5 章 线性回归' },
          { id: '6', title: '第 6 章 pH 与缓冲溶液' },
          { id: '7', title: '第 7 章 滴定分析入门' },
          { id: '8', title: '第 8 章 滴定分析进阶' },
          { id: '9', title: '第 9 章 电位滴定法' },
          { id: '10', title: '第 10 章 Gran 作图法' },
          { id: '11', title: '第 11 章 电化学分析' },
          { id: '12', title: '第 12 章 重量分析' },
          { id: '13', title: '第 13 章 课程总结' }
        ],
        filePattern: 'notes/notes-{id}.md',
        defaultId: '1',
        listPage: 'notes.html',
        titlePrefix: '第',
        urlParam: 'chapter',
        course: 'analytical-chemistry',
        navTitle: '📚 章节导航',
        loadingText: '正在加载笔记内容...',
        errorText: '无法加载笔记内容',
        prevText: '← 上一章',
        nextText: '下一章 →',
        listText: '📝 返回笔记列表'
      });
    });
  </script>
</body>
</html>
